id = "vest"
name = "Vest"
description = "Language support for Vest DSL - a parser and serializer generator for binary data formats"
version = "0.1.0"
schema_version = 1
authors = ["Vest Team"]
repository = "https://github.com/y1ca1/vest-lsp"
themes = []
icon_themes = []
languages = ["languages/vest"]
capabilities = []

[lib]
kind = "Rust"
version = "0.7.0"

[grammars.vest]
repository = "https://github.com/y1ca1/vest-lsp"
rev = "e63d8c56bc86ea004f8ffae05d9fccec99a9e1dd"
path = "vest_syntax"

[language.vest]
name = "Vest"
grammar = "vest"
path_suffixes = ["vest"]
line_comments = ["// "]
block_comment = ["/*", "*/"]
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = false },
  { start = "(", end = ")", close = true, newline = false },
  { start = "<", end = ">", close = true, newline = false },
]
word_characters = ["@"]

[language_servers.vest-lsp]
name = "Vest LSP"
languages = ["Vest"]
